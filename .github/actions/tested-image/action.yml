name: Tested image
description: >
  Build the tested image (.devcontainer/dodona-tested.dockerfile) from the GitHub
  Actions build cache. The `build` job calls this to warm the cache (load: false,
  cache-to set); the other jobs call it with `run` to load the image and run a
  command inside it, with the dev dependencies layered on first. Assumes the
  repository has already been checked out.
inputs:
  run:
    description: Command to run inside the image. When empty, the image is only built/loaded.
    required: false
    default: ""
  load:
    description: Load the built image into the local Docker daemon so it can be run.
    required: false
    default: "true"
  cache-to:
    description: Optional buildx cache export, set by the cache-warming build job.
    required: false
    default: ""
runs:
  using: composite
  steps:
    - uses: docker/setup-buildx-action@v3
    - uses: docker/build-push-action@v6
      with:
        context: .devcontainer
        file: .devcontainer/dodona-tested.dockerfile
        push: false
        load: ${{ inputs.load }}
        tags: dodona/dodona-tested:ci
        cache-from: type=gha,scope=dodona-tested
        cache-to: ${{ inputs.cache-to }}
    - if: ${{ inputs.run != '' }}
      shell: bash
      env:
        RUN_CMD: ${{ inputs.run }}
      run: |
        docker run --rm --user root \
          -v "$GITHUB_WORKSPACE":/workdir -w /workdir \
          dodona/dodona-tested:ci \
          bash -c "bash .devcontainer/dev-dependencies.sh && $RUN_CMD"
