name: Load tested image
description: >
  Build the tested image from the GitHub Actions build cache (warmed by the
  `build` job) and load it into the local Docker daemon as
  `dodona/dodona-tested:ci`, so a job can run commands inside it with `docker run`.
  Assumes the repository has already been checked out.
runs:
  using: composite
  steps:
    - uses: docker/setup-buildx-action@v3
    - uses: docker/build-push-action@v6
      with:
        context: .devcontainer
        file: .devcontainer/dodona-tested.dockerfile
        push: false
        load: true
        tags: dodona/dodona-tested:ci
        cache-from: type=gha,scope=dodona-tested
