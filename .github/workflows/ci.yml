name: CI

on:
  push:
  pull_request_target:
    types: [labeled]

env:
  EXERCISES_COMMIT: 31ef0f174efaeba2a37415115e7fd0332573d9b2

jobs:
  # Builds the tested image once and warms the GitHub Actions build cache, so the
  # jobs that run inside it (via the load-tested-image action) get a cache hit
  # instead of each building from scratch. No registry login or push: the image is
  # ferried between jobs through the type=gha cache.
  build:
    if: ${{ github.event.action != 'labeled' || (github.event.action == 'labeled' && github.event.label.name == 'run tests') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          repository: ${{ github.event.pull_request.head.repo.full_name }}
      - uses: docker/setup-buildx-action@v3
      - name: Build the tested image and warm the gha cache
        uses: docker/build-push-action@v6
        with:
          context: .devcontainer
          file: .devcontainer/dodona-tested.dockerfile
          push: false
          load: false
          tags: dodona/dodona-tested:ci
          cache-from: type=gha,scope=dodona-tested
          cache-to: type=gha,scope=dodona-tested,mode=max

  test:
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          repository: ${{ github.event.pull_request.head.repo.full_name }}
      - uses: ./.github/actions/load-tested-image
      - name: Run tests in container
        run: |
          docker run --rm --user root \
            -v "$GITHUB_WORKSPACE":/workdir -w /workdir \
            dodona/dodona-tested:ci \
            bash -c "bash .devcontainer/dev-dependencies.sh && pytest -n auto --cov=tested --cov-report=xml tests/"
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./result/coverage.xml

  lint:
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          repository: ${{ github.event.pull_request.head.repo.full_name }}
      - uses: ./.github/actions/load-tested-image
      - name: Run isort and black
        run: |
          docker run --rm --user root \
            -v "$GITHUB_WORKSPACE":/workdir -w /workdir \
            dodona/dodona-tested:ci \
            bash -c "bash .devcontainer/dev-dependencies.sh && isort --check-only --diff ./tested ./tests && black --check ./tested ./tests"

  types:
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          repository: ${{ github.event.pull_request.head.repo.full_name }}
      - uses: ./.github/actions/load-tested-image
      - name: Run pyright
        run: |
          docker run --rm --user root \
            -v "$GITHUB_WORKSPACE":/workdir -w /workdir \
            dodona/dodona-tested:ci \
            bash -c "bash .devcontainer/dev-dependencies.sh && pyright ./tested ./tests"

  translations:
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          repository: ${{ github.event.pull_request.head.repo.full_name }}
      - uses: ./.github/actions/load-tested-image
      - name: Check translation files
        run: |
          docker run --rm --user root \
            -v "$GITHUB_WORKSPACE":/workdir -w /workdir \
            dodona/dodona-tested:ci \
            bash -c "bash .devcontainer/dev-dependencies.sh && python -m tested.internationalization.validation"

  # check if the JS exercises still work.
  javascript-dodona:
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          repository: ${{ github.event.pull_request.head.repo.full_name }}
      - run: |
          echo "$JAVASCRIPT_EXERCISES_KEY" > private
          chmod 0600 private
          GIT_SSH_COMMAND='ssh -o "StrictHostKeyChecking no" -i private' git clone git@github.ugent.be:Scriptingtalen/javascript-oefeningen.git
          rm private
        env:
          JAVASCRIPT_EXERCISES_KEY: ${{ secrets.JAVASCRIPT_EXERCISES_KEY }}
      - run: git checkout $EXERCISES_COMMIT
        working-directory: ./javascript-oefeningen
      - uses: ./.github/actions/load-tested-image
      - name: Run tests in container
        run: |
          docker run --rm --user root \
            -e EXERCISE_REPO=javascript-oefeningen \
            -v "$GITHUB_WORKSPACE":/workdir -w /workdir \
            dodona/dodona-tested:ci \
            bash -c "bash .devcontainer/dev-dependencies.sh && pytest -x -n auto tests/test_integration_javascript.py"
