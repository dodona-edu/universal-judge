es:
  oracles:
    exception:
      staff: >-
        Se esperaba un valor de excepción, pero se recibió %{actual}, lo cual
        causó un error durante el análisis: %{exception}
      student: >-
        Dodona no comprende esta excepción. Reporta este error al docente.
      status: "Excepción no válida"
    exitcode:
      status:
        invalid: "Código de salida no válido %{exit_code}."
        message: "No se puede interpretar %{exit_code} como código de salida."
        wrong: "Código de salida incorrecto"
    nothing:
      runtime: "Error en tiempo de ejecución"
      unexpected: "Salida inesperada"
    programmed:
      student:
        default: >-
          Algo salió mal al evaluar la solución.
          Reporta esto al docente.
      result: "El resultado de la evaluación programada no es válido:"
      stdout: "Esto se produjo en stdout:"
      stderr: "Esto se produjo en stderr:"
    specific:
      student:
        default: >-
          Algo salió mal al evaluar la solución.
          Reporta esto al docente.
      missing:
        status: "Falta la salida."
        message: "Falta la salida aquí."
      status: "Error al evaluar el resultado."
      staff: >-
        Se recibió una salida no válida para la evaluación específica: %{actual}.
        O bien el plan de pruebas no es válido, o el código de evaluación tiene un
        error, o el estudiante está intentando hacer trampa: %{e}
    text:
      file:
        unexpected:
          status: "Salida inesperada."
          message: "No se esperaba salida para el canal, pero se encontró: %{actual}."
        not-found: "Archivo no encontrado."
    value:
      missing: "Falta el valor de retorno."
      datatype:
        wrong: "El valor de retorno tiene un tipo de dato incorrecto."
        message: "Se esperaba un valor de tipo %{expected}, pero era de tipo %{actual}."
  judge:
    compilation:
      exitcode: "Código de salida %{exitcode}."
    core:
      unsupported:
        language: "Lenguaje de programación no soportado"
      compilation: "Compilación"
      invalid:
        source-code: "Código fuente no válido"
      initialization: "Error al inicializar el código:"
    evaluation:
      time-limit: "Tiempo límite excedido"
      memory-limit: "Límite de memoria excedido"
      not-executed: "Esta(s) prueba(s) no se ejecutaron"
      missing: "Resultado faltante"
      files:
        zero: "Sin archivos"
        one: "Archivo: %{files}"
        many: "Archivos: %{files}"
      dynamic: "Dinámico"
      hidden_expected: "\U0001f937 Debes encontrar la solución correcta por tu cuenta."
    programmed:
      student: >-
        Algo salió mal al evaluar la solución.
        Por favor contacta al docente.
      unsupported: "La evaluación en %{lang} no está soportada"
      unknown:
        compilation: "Error de compilación desconocido"
      produced:
        stderr: "El código de evaluación produjo la siguiente salida en stderr:"
        stdout: "El código de evaluación produjo la siguiente salida en stdout:"
      failed: "La evaluación específica del lenguaje de programación falló."
      invalid: "El resultado de la evaluación programada no es válido:"
  languages:
    config:
      unknown:
        compilation: "Error de compilación desconocido"
    generator:
      missing:
        input: "No se encontró entrada."
    linter:
      more-info: "más información"
      not-found: "¡%{linter} no encontrado!"
    python:
      linter:
        crashed: "Pylint se detuvo inesperadamente"
        output: "Pylint produjo una salida incorrecta."
    typescript:
      runtime:
        invalid:
          exception: "%{actual_type} no es una instancia de Error (o una subclase)."
      linter:
        timeout: "ESLint excedió el tiempo límite"
        memory: "ESLint excedió el límite de memoria"
        output: "ESLint produjo una salida incorrecta."
    javascript:
      runtime:
        invalid:
          exception: "%{actual_type} no es una instancia de Error (o una subclase)."
      linter:
        timeout: "ESLint excedió el tiempo límite"
        memory: "ESLint excedió el límite de memoria"
        output: "ESLint produjo una salida incorrecta."
    haskell:
      linter:
        timeout: "HLint excedió el tiempo límite"
        memory: "HLint excedió el límite de memoria"
        output: "HLint produjo una salida incorrecta."
    kotlin:
      linter:
        timeout: "KTLint excedió el tiempo límite"
        memory: "KTLint excedió el límite de memoria"
        output: "KTLint produjo una salida incorrecta."
    java:
      linter:
        timeout: "Checkstyle excedió el tiempo límite"
        memory: "Checkstyle excedió el límite de memoria"
        output: "Checkstyle produjo una salida incorrecta."
    c:
      linter:
        timeout: "CPPCheck excedió el tiempo límite"
        memory: "CPPCheck excedió el límite de memoria"
        output: "CPPCheck produjo una salida incorrecta."
    bash:
      linter:
        timeout: "ShellCheck excedió el tiempo límite"
        memory: "ShellCheck excedió el límite de memoria"
        output: "ShellCheck produjo una salida incorrecta."
